<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AI Help Desk Assistant</title>
  <link rel="manifest" href="manifest.json">
  <style>
    :root{--bg:#0b0b0d;--panel:#070708;--muted:#888;--accent:#0a84ff}
    body { background:var(--bg); color:#eee; font-family: system-ui, Arial; padding:16px; }
    .container { max-width:900px; margin:0 auto; }
    input[type="text"], textarea, select { width:70%; padding:8px; margin-right:8px; border-radius:6px; border:1px solid #333; background:#111; color:#eee; }
    button { padding:8px 12px; border-radius:6px; border:1px solid #333; background:var(--accent); color:white; cursor:pointer; }
    #chat { margin-top:12px; min-height:120px; max-height:260px; overflow:auto; border:1px solid #333; padding:8px; background:var(--panel); }
    hr { border:none; border-top:1px solid #222; margin:8px 0; }
    .section { margin-top:20px; }
    #ticketList > div { background:var(--panel); }
    .ticket { border:1px solid #444; padding:10px; margin:5px 0; display:flex; justify-content:space-between; align-items:flex-start }
    .ticket .meta { max-width:70%; }
    .small { font-size:0.9em; color:var(--muted) }
    .controls button { margin-left:6px }
    .install-wrap { margin-bottom:12px; }
    .topbar { display:flex; gap:12px; align-items:center; }
    .inline { display:inline-block }
  </style>
</head>
<body>
  <div class="container">
    <h1>🤖 AI Help Desk Assistant</h1>

    <div class="install-wrap" id="installWrap"></div>

    <div class="topbar">
      <div style="flex:1">
        <div id="chat" aria-live="polite"></div>
      </div>
      <div style="width:320px">
        <label class="small">Input</label><br>
        <input id="question" type="text" placeholder="Describe your computer problem..." />
        <div style="margin-top:8px">
          <button id="diagnoseBtn">Diagnose Problem</button>
          <button id="clearChatBtn">Clear Chat</button>
        </div>
      </div>
    </div>

    <div class="section">
      <h2>🎫 Tickets</h2>
      <div style="display:flex;gap:8px;align-items:center">
        <input id="searchBox" placeholder="Search tickets..." />
        <button id="newTicketBtn">New Ticket</button>
        <button id="viewTicketsBtn">View Tickets</button>
        <label class="small inline">Backend:</label>
        <select id="backendMode"><option value="auto">Auto (prefer backend)</option><option value="local">Local only</option><option value="backend">Backend only</option></select>
      </div>
      <div id="ticketList"></div>
    </div>

    <div class="section">
      <h2>📊 Dashboard</h2>
      <button id="refreshStatsBtn">Refresh Stats</button>
      <div id="stats"></div>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
